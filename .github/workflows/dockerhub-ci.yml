name: Docker Hub

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  schedule:
    # Ejecutar todos los días a las 8:00 AM hora Perú (UTC-5) → 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions UI

jobs:
  dockerhub:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout del código
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login a Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}
          password: ${{ secrets.DOCKERHUB_TOKEN_LIONEL }}

      # 3. Build y Push con tags latest y SHA
      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          #dockerfile: Dockerfile   # Dockerfile en la raíz del proyecto
          file: ./dockerfile-lionel/Dockerfile        # Dockerfile en la carpeta dockerfile-juan
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}/as241s5-aej-16-be:latest
            ${{ secrets.DOCKERHUB_USERNAME_LIONEL }}/as241s5-aej-16-be:${{ github.sha }}