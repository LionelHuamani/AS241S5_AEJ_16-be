name: SonarCloud Analysis

on:
  push:
    branches:
     - develop
     - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:  # Permite ejecución manual desde GitHub Actions UI

jobs:

  sonarcloud:
    name: Build and SonarCloud Scan
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout del código
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para SonarCloud (análisis de historial completo)

      # 2. Configurar JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Build y análisis con SonarCloud
      - name: Build and Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -DskipTests \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false

      # 4. Pipeline finalizado
      - name: Pipeline Finished
        run: echo "SonarCloud analysis completed successfully"
