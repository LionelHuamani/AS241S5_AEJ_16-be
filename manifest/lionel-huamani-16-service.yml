# kubectl apply -f lionel-huamani-16-service.yml
apiVersion: v1
kind: Service
metadata:
  name: lionel-huamani-16-service
  namespace: lionel-huamani-16-namespace
spec:
  type: NodePort      #30000-32767  # Cambia a LoadBalancer si estás en un entorno de nube
  ports:
  - port: 8081       # Puerto que el Service expondrá
    targetPort: 8081  # Puerto en el contenedor donde tu aplicación escucha
    nodePort: 30001   # Puerto asignado en el nodo, opcional
  selector:
    app: lionel-huamani-16-deployment  # Debe coincidir con las etiquetas del Deployment