# MINIKUBE FUNCIONA EN CODESPACE | LOCAL
# KUBECTL FUNCIONA DIRECTO EN KILLERCODA (SIN MINIKUBE)

# consultar versión de minikube
minikube version

# consultar si minikube esta en start o stop
minikube status

# iniciar clúster kubernetes
minikube start

# ingresar a la carpeta de los manifiestos de kubernetes (manifest)
cd manifest

# listar namespace
kubectl get namespace
kubectl get ns

# crear un namespace "lionel" por comando mediante un archivo: "lionel-huamani-16-namespace.yml"
kubectl apply -f lionel-huamani-16-namespace.yml

# consultar namespace en uso por "default" | LINUX
kubectl config view --minify | grep namespace

# consultar namespace en uso por "default" | WINDOWS
kubectl config view --minify | findstr namespace

# cambiar un namespace en uso por "default" a "lionel-huamani-16-namespace"
kubectl config set-context --current --namespace=lionel-huamani-16-namespace

# consultar todos los recursos de un namespace "lionel-huamani-16-namespace"
kubectl get all -n lionel-huamani-16-namespace

# consultar todos los recursos y secret de un namespace "lionel-huamani-16-namespace"
kubectl get all,secrets -n lionel-huamani-16-namespace


# listar services del namespace "lionel-huamani-16-namespace"
minikube service lionel-huamani-16-service -n lionel-huamani-16-namespace
minikube service list

# probar el microservicio dentro del clúster con curl
curl http://192.168.49.2:30001/v1/api/ai
curl http://192.168.49.2:30001/v1/api/ai/analyze

# crear un túnel de puerto la máquina local (host) y el clúster de Kubernetes
kubectl port-forward service/lionel-huamani-16-service 8081:30001


